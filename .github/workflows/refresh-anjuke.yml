name: Refresh Anjuke listings

on:
  workflow_dispatch:
    inputs:
      anjuke_cookie:
        description: Anjuke browser cookie (optional if ANJUKE_COOKIE repo secret is set)
        required: false
        type: string

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            data/anjuke_blocks.json
            data/anjuke_communities.json
            data/anjuke_listings_raw.jsonl
            data/anjuke_listings_raw.jsonl.bak
            data/anjuke_off_market.jsonl
            data/scraping
          key: anjuke-raw-v1
          restore-keys: |
            anjuke-raw-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-scrape.txt

      - name: Install Python dependencies
        run: pip install -r requirements-scrape.txt

      - name: Refresh Anjuke data (no transit)
        env:
          ANJUKE_COOKIE: ${{ inputs.anjuke_cookie || secrets.ANJUKE_COOKIE }}
        run: |
          if [ -z "$ANJUKE_COOKIE" ]; then
            echo "Set workflow input anjuke_cookie or repository secret ANJUKE_COOKIE"
            exit 1
          fi
          python scripts/refresh_anjuke_listings.py

      - name: Commit updated frontend data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/
          if git diff --staged --quiet; then
            echo "No frontend data changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh Anjuke listings"
          git push
